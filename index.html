<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FUENTE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&amp;display=swap" rel="stylesheet">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <title>Libreria - Jahvel Ebenezer</title>
</head>
<body>

  <!-- HEADER -->
  <section>
    <nav class="navbar navbar-dark bg-color">
      <div class="container-fluid navbar navbar-expand-lg navbar-light bg-color" style="height: 92px;">
        <div>
          <a>
            <img src="images/various/logo.png" alt="logo pagina" width="45px" height="60px">
          </a>
        </div>
        <div class="d-flex justify-content-lg-end align-items-end justify-content-md-center pt-2" style="width: 50%;">
          <h1 class="fs-2">JAHVEL EBENEZER</h1>
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="">Biblias</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="">Libros</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="">Estudio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="">Novedades</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </section>
  <!-- FIN DE HEADER -->

  <!-- CARRUSEL -->
  <div id="carouselExampleIndicators" class="carousel slide container d-none d-lg-block d-md-block d-xl-none" data-bs-ride="carousel" style="width: auto; height: 300px;">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="images/various/descuentos.jpg" class="d-block p-2 bd-highlight" style="width: 100%; height: 300px;" alt="Descuentos">
      </div>
      <div class="carousel-item">
        <img src="images/various/envios.png" class="d-block w-100" style="width: 100%; height: 300px;" alt="Ofertas">
      </div>
      <div class="carousel-item">
        <img src="images/various/banner-busquedas.jpg" class="d-block w-100" style="width: 100%; height: 300px;" alt="Envios a todo el país">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
  <!-- FIN DE CARRUSEL -->









    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
</body>
</html>
